---
driver:
  name: vagrant

verifier:
  name: inspec

provisioner:
  name: chef_zero
  product_version: 16
  deprecations_as_errors: true
  chef_license: accept-no-persist

platforms:
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: debian-11
  - name: debian-12
  - name: ubuntu-20.04
  - name: ubuntu-22.04
  - name: ubuntu-24.04

suites:
  - name: default
    run_list:
      - recipe[fastly_test::default]
  - name: service
    run_list:
      - recipe[fastly_test::service]
    attributes:
      fastly:
        api_key: ENV['FASTLY_API_KEY']
